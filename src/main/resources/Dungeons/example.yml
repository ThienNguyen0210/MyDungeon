# ============================================================
# CẤU HÌNH PHÓ BẢN: 1 (Phiên bản nâng cấp từ Dungeon cũ)
# Plugin: Dungeon (MythicDungeons / tương tự)
# Mục đích: Tạo instance phó bản riêng cho từng người chơi/đội
# Luu y: Title và Subtitle đã được chuyển sang messages.yml (không config ở đây nữa)
# ============================================================

# ID duy nhất của phó bản (dùng để gọi lệnh /dungeon join 1 hoặc trong requires)
dungeon-id: '1' # không xài nhé id dungeon là <id>.yml

# Tên hiển thị khi vào phó bản (hỗ trợ màu + &l)
display-name: '&e&lTHỬ THÁCH HẦM NGỤC SLIME'

# World template: Plugin sẽ copy world này để tạo instance tạm (temp_dungeonez_...)
# Khi người chơi vào, họ sẽ ở trong bản sao riêng, không ảnh hưởng world chính
world-template: dungeonez
respawn-at-spawn: true # mới #x
allow-fly: false # Cho phép bay (Fly) hay không
allow-elytra: true # Cho phép dùng cánh cứng (Elytra) hay không
# Vị trí spawn khi bắt đầu phó bản (world, x, y, z)
spawn-location: dungeonez, 5, 56, 11

# Vị trí thoát ra world chính khi hoàn thành hoặc thoát (world, x, y, z, yaw, pitch)
exit-location: world, 11, 120, -180, 0, 0

# Thời gian đếm ngược trước khi phó bản chính thức bắt đầu (giây)
countdown-time: 5

# Thời gian cho phép thoát phó bản mà không bị phạt (giây)/
quit-time: 5

# Thời gian tính từ lúc fail đến khi bị kick ra (giây)
fail-time: 5

# Thời gian chờ hồi sinh sau khi chết trong phó bản (giây)
respawn-cooldown: 5
send-damage-summary: false # thông báo xếp hạng damage
# ============================================================
# HỆ THỐNG BẢO VỆ CĂN CỨ (Base Defend) - Cơ chế trụ máu
# ============================================================
base-defend:
  enabled: true # Bật/tắt cơ chế bảo vệ căn cứ
  health: 50 # Máu tối đa của căn cứ (TextDisplay + BossBar)
  display-name: '&a&lCĂN CỨ' # Tên hiển thị trên thanh máu và bảng
  regen-delay: 10 # Sau 10 giây không bị quái đánh → bắt đầu hồi máu
  regen-amount: 2.0 # Mỗi giây hồi 2 máu (có thể để số thập phân)

  # Vị trí tâm căn cứ (dùng để tính bán kính tấn công)
  # Lưu ý: Plugin tự copy sang world instance (temp_...) nên dùng tọa độ world gốc
  location: dungeonez,0.5,51,3.5

  # Vùng quái sẽ tự động tấn công căn cứ
  radius: 5.0 # Bán kính vùng tấn công (block)
  zone-type: CIRCLE # CIRCLE = tròn, SQUARE = vuông

  # Thông báo khi căn cứ bị phá hủy
  fail-message: '&c&lCăn cứ đã bị san phẳng! Phó bản thất bại.'

# Số mạng tối đa của người chơi trong phó bản (chết 5 lần = fail)
max-lives: 5

# ============================================================
# CÀI ĐẶT CHUNG CỦA PHÓ BẢN
# ============================================================
Settings:
  Type: BOTH # SOLO / PARTY / TEAM
  MinPlayers: 1 # Số người tối thiểu để bắt đầu
  MaxPlayers: 10 # Số người tối đa (dù SOLO vẫn để 4 để sau này mở rộng)

# Giới hạn thời gian hoàn thành phó bản
time-limit:
  enabled: true # false sẽ vô thời hạn
  seconds: 600 # 10 phút = 600 giây (hết giờ = fail)

# ============================================================
# LỆNH CHẠY KHI CÁC SỰ KIỆN XẢY RA
# ============================================================
start-commands:
  - '[CONSOLE] bc &e%player% &fđã bắt đầu hành trình chinh phục &aHầm Ngục Slime'

quit-commands:
  - '[OP] bc &e%player% &fđã rời khỏi phó bản.'

win-commands:
  - '[CONSOLE] eco give %player% 5000'
  - '[CONSOLE] mi give CONSUMABLE DUNGEON1 %player% 1'
  - '[CONSOLE] bc &e%player% &fvừa tiêu diệt &bTrùm Gấu Băng &fvà phá đảo phó bản!'
damage-rewards: # định nghĩa các độ khó nào sẽ rơi quà gì theo damage và tỉ lệ  #format như sau
  enabled: true # <damage>:<chance>:<id> với id lấy từ /dungeon database
  tiers:
    EASY:
      - '50000:10:1'
    HARD:
      - 100000:100:1
      - 500000:100:2
    NIGHTMARE:
      - '1000000:50:2'
      - '2000000:10:3'
# Yêu cầu phó bản trước phải hoàn thành (định dạng: -id:amount) /dungeon database để check id
requires: # format như sau <id>:<amount> với id lấy từ /dungeon database check id item
  - '2:1'
# có thể thêm nhiều item
# Thông báo đầu tiên khi vào phó bản (có thể để trống)
message-first: '&a&l[!] &fPhó bản hầm ngục xương khô'

# ============================================================
# NHÓM BLOCK ĐỂ BREAK / PLACE (dùng trong break-actions / place-actions)
# ============================================================
# break-groups: Khi người chơi phá các block này → trigger hành động
break-groups:
  cong_chinh: # Tên nhóm (dùng ở stage)
    - -3.5, 52, 0
    - -3.5, 51, 0
    - -2.5, 51, 0
    - -1.5, 51, 0

  test: # Nhóm test (dùng để debug)
    - -3.0, 52.0, -1.0
  # ... (các tọa độ khác)

  test1: # đây là id nhá:)
    - -7.0, 50.0, -2.0
  test123:
    - -20.0, 51.0, -10.0
    - -21.0, 54.0, -10.0
# cái này phải /dungeon edit mới làm nổi
# ... (các tọa độ khác)

# place-groups: Khi người chơi đặt block đúng loại → trigger hành động
place-groups:
  cau_go: # Đặt gỗ sồi
    - -3.5, 52, 0, OAK_PLANKS
    - -3.5, 52, 1, OAK_PLANKS
    - -3.5, 52, 2, OAK_PLANKS
  # cái này phải /dungeon edit mới làm nổi

  tuong_da:
    - 10, 60, 10, STONE

  test1: # Đặt GRAVEL (nhóm test)
    - -9.0, 51.0, -2.0, GRAVEL
